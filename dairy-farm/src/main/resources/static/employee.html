<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Management</title>

<link rel="stylesheet" href="../css/employee.css">

</head>

<body>

<div class="container">

<h1>Employee Management</h1>

<form id="employeeForm">

<input type="hidden" id="employeeId">

<div class="row">

<div class="input-group">
<label>Employee Name</label>
<input type="text" id="employeeName" required>
</div>

<div class="input-group">
<label>Gender</label>

<select id="gender">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

</div>

</div>

<div class="row">

<div class="input-group">
<label>Mobile</label>
<input type="text" id="mobile" maxlength="10">
</div>

<div class="input-group">
<label>Joining Date</label>
<input type="date" id="joiningDate">
</div>

</div>

<div class="row">

<div class="input-group">
<label>Salary</label>
<input type="number" id="salary">
</div>

<div class="input-group">
<label>Role</label>

<select id="role">
<option>Farm Worker</option>
<option>Manager</option>
<option>Cleaner</option>
<option>Driver</option>
<option>Veterinary Assistant</option>
</select>

</div>

</div>

<div class="row">

<div class="input-group">
<label>Status</label>

<select id="status">
<option>Active</option>
<option>Inactive</option>
</select>

</div>

<div class="input-group">
<label>Address</label>
<textarea id="address"></textarea>
</div>

</div>

<div class="buttons">

<button type="button" id="saveBtn" onclick="saveEmployee()">
Save
</button>

<button type="reset" onclick="clearForm()">
Clear
</button>

</div>

</form>

<hr>

<h2>Employee List</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Gender</th>
<th>Mobile</th>
<th>Role</th>
<th>Salary</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="employeeTable">

</tbody>

</table>

</div>

<script src="../js/employee.js"></script>

</body>
</html>
